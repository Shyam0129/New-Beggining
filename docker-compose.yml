version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MCP_SERVER_URL=http://mcp_server:5000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  mcp_server:
    build: ./mcp_server
    ports:
      - "5000:5000"
    volumes:
      - ./mcp_server:/app
