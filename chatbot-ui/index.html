<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      What can I help with?
    </div>

    <div class="chat-body" id="chatBody">
      <!-- Example chat messages -->
      <div class="chat-message"><b>User:</b> Hello!</div>
      <div class="chat-message"><b>AI:</b> Hi there 👋 How can I assist you today?</div>
    </div>

    <div class="chat-footer">
      <div class="input-box">
        <input type="text" id="chatInput" placeholder="Ask anything...">
        <button id="sendBtn">↑</button>
      </div>
      <div class="options">
        <div class="option-btn">Deep Search</div>
        <div class="option-btn">Reason</div>
      </div>
      <div class="footer-note">
        AI can make mistakes. Please double-check responses.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
