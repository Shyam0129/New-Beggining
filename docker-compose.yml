
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MCP_SERVER_URL=http://mcp_server:5000
      - PORT=8000
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8000
      - PORT=3000
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - backend

  mcp_server:
    build: ./mcp_server
    ports:
      - "5000:5000"
    volumes:
      - ./mcp_server:/app
    environment:
      - PORT=5000
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
